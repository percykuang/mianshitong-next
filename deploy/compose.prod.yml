services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ${IMAGE_NAMESPACE}/mianshitong-next-migrate:${IMAGE_TAG:-main-latest}
    restart: 'no'
    env_file:
      - .env.prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${IMAGE_NAMESPACE}/mianshitong-next-web:${IMAGE_TAG:-main-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      default:
      edge:
        aliases:
          - mianshitong-web

  admin:
    image: ${IMAGE_NAMESPACE}/mianshitong-next-admin:${IMAGE_TAG:-main-latest}
    restart: unless-stopped
    env_file:
      - .env.prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      default:
      edge:
        aliases:
          - mianshitong-admin

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - edge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  edge:
    external: true
